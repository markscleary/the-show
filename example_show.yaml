show:
  id: outreach-enrichment-001
  title: "Outreach enrichment run"
  rehearsal: false
  max-duration-seconds: 7200
  max-scenes: 20

  sliders:
    risk: housecat
    improvisation: standard   # enables adaptive variations

  stage-manager:
    mode: deterministic

  bible:
    objective: "Load targets, enrich contacts, write clean output, report results"
    escalation:
      blocked-scenes-consecutive: 2
      budget-consumed-percentage: 75
      unexpected-credential-request: true
      any-scene-duration-over-seconds: 900
    reporting:
      programme-format: [markdown, json]
      deliver-to: [disk]
    adaptation-bounds:
      batch-size:
        min: 2
        max: 20

  # ── Urgent Contact configuration (Session 3: mock channel) ────────────────
  urgent-contact:
    mode: sequential            # sequential | parallel
    max-per-show: 3             # throttle for unplanned urgent matters
    send-interval-seconds: 15   # seconds between sequential contact attempts
    contacts:
      - role: producer
        channel: mock
        handle: "@producer"
        auth: reply-token       # send 6-digit token; must appear in reply

  running-order:

    # Scene 1 — load the target list from disk (trusted input)
    - scene: load_targets
      title: "Load outreach targets"
      input-trust: trusted
      outputs:
        contacts:
          type: list
          schema: contact[]
      principal:
        method: tool-call
        agent: deep-dive
        action: read-csv
        params:
          path: /Users/mark/S+S/outreach/targets.csv
      fallbacks:
        - label: backup-file
          method: tool-call
          agent: deep-dive
          action: read-csv
          params:
            path: /Users/mark/S+S/outreach/targets-backup.csv
      success-when:
        schema: contact[]
        min-length: 50
      retry-policy:
        max-attempts: 2
        backoff: exponential
        base-delay-seconds: 1
        jitter: true
        retriable-errors: [rate-limit, timeout, io-error]
      timeout-seconds: 60
      cut:
        condition: escalate
        reason: "Cannot proceed without contacts"

    # Scene 2 — human-approval gate (Session 3: real Urgent Contact with mock channel)
    - scene: approve_run
      title: "Operator approval check"
      depends-on: [load_targets]
      input-trust: trusted
      outputs:
        decision:
          type: string
          schema: string
      principal:
        method: human-approval
        severity: urgent          # urgent (default) | critical
        agent: stage-manager
        brief: "Do you approve this enrichment run? Reply APPROVE <token> to confirm."
      success-when:
        schema: string
      cut:
        condition: escalate
        reason: "Cannot proceed without operator approval"

    # Scene 3 — enrich contacts from agent (untrusted output + adaptive + field-validators)
    - scene: enrich_contacts
      title: "Enrich contacts"
      depends-on: [load_targets, approve_run]
      inputs:
        contacts: from(load_targets.contacts)
      input-trust: untrusted   # LLM output — run through sanitiser
      outputs:
        enriched_contacts:
          type: list
          schema: enriched_contact[]
          field-validators:
            website: "url-allowlist:/path/to/trusted-domains.txt"
            email: "regex:^[\\w.-]+@[\\w.-]+$"
      principal:
        method: sub-agent
        agent: deep-dive
        brief: |
          Enrich each contact with current title, website, and LinkedIn URL.
        params:
          batch-size: 10
      fallbacks:
        - label: alternative-agent
          method: sub-agent
          agent: quin
          brief: |
            Enrich each contact with current title, website, and LinkedIn URL.
          params:
            batch-size: 5
      adaptive:
        allowed: true
        bounds:
          batch-size:
            min: 3
            max: 10
      success-when:
        schema: enriched_contact[]
        min-length: 30
      retry-policy:
        max-attempts: 3
        backoff: exponential
        base-delay-seconds: 1
        jitter: true
        retriable-errors: [rate-limit, timeout, 5xx]
      timeout-seconds: 600
      cut:
        condition: continue-with-partial
        minimum-acceptable: 30

    # Scene 4 — filter to qualified contacts
    - scene: filter_contacts
      title: "Filter to qualified contacts"
      depends-on: [enrich_contacts]
      inputs:
        enriched_contacts: from(enrich_contacts.enriched_contacts)
      input-trust: trusted
      outputs:
        qualified_contacts:
          type: list
          schema: enriched_contact[]
      principal:
        method: sub-agent
        agent: quin
        brief: |
          Filter to contacts who have both a title and a website URL.
        params:
          batch-size: 20
      success-when:
        min-length: 10
      cut:
        condition: escalate
        reason: "Too few qualified contacts to proceed"

    # Scene 5 — write output file (side-effectful: gets idempotency key)
    - scene: write_output
      title: "Write output file"
      depends-on: [filter_contacts]
      inputs:
        contacts: from(filter_contacts.qualified_contacts)
      input-trust: trusted
      outputs:
        output_path:
          type: string
          schema: string
      principal:
        method: tool-call
        agent: deep-dive
        action: write-json
        params:
          path: /tmp/the-show-output.json
      success-when:
        schema: string
      cut:
        condition: continue
        reason: "Output write failed, but data was processed — continuing"
